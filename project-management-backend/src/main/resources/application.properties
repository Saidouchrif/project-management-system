spring.application.name=project-management-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/projectdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
jwt.secret=${JWT_SECRET:mySuperSecretJwtKeyForProjectManagement123!}
jwt.expiration=86400000
jwt.refreshExpiration=604800000
app.bootstrap.admin.email=${APP_ADMIN_EMAIL:admin@pms.local}
app.bootstrap.admin.password=${APP_ADMIN_PASSWORD:admin123}
app.bootstrap.admin.name=${APP_ADMIN_NAME:System Admin}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
